name: Scrape

on:
  schedule:
    # Run daily at 20:00 UTC — most decisions published by late afternoon
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      banks:
        description: "Space-separated bank IDs to scrape (leave empty for all)"
        required: false
        default: ""
      backfill:
        description: "Set to 'true' to scrape full history (ignores calendar gate)"
        required: false
        default: "false"

concurrency:
  group: scrape
  cancel-in-progress: true

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run scraper
        run: |
          BANKS_ARG=""
          BACKFILL_ARG=""
          if [ -n "${{ github.event.inputs.banks }}" ]; then
            BANKS_ARG="--banks ${{ github.event.inputs.banks }}"
          fi
          if [ "${{ github.event.inputs.backfill }}" = "true" ]; then
            BACKFILL_ARG="--backfill"
          fi
          uv run python scrape.py $BANKS_ARG $BACKFILL_ARG

      - name: Commit new documents
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add communications_*.csv
          if git diff --cached --quiet; then
            echo "No new documents scraped."
          else
            COUNT=$(git diff --cached --numstat | awk '{sum += $1} END {print sum}')
            git commit -m "scrape: add ~${COUNT} rows ($(date -u +%Y-%m-%d))"
            git push
          fi
