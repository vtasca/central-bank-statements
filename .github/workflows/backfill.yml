name: Historical Backfill

on:
  workflow_dispatch:
    inputs:
      banks:
        description: "Space-separated bank IDs to backfill (leave empty for all)"
        required: false
        default: ""

jobs:
  backfill:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # historical scrapes can take hours
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run backfill
        run: |
          BANKS_ARG=""
          if [ -n "${{ github.event.inputs.banks }}" ]; then
            BANKS_ARG="--banks ${{ github.event.inputs.banks }}"
          fi
          uv run python -m pipeline.run --backfill $BANKS_ARG --verbose

      - name: Commit backfilled documents
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "Nothing new to commit."
          else
            COUNT=$(git diff --cached --name-only | grep -c '\.json$' || true)
            git commit -m "backfill: add ${COUNT} historical documents ($(date -u +%Y-%m-%d))"
            git push
          fi
