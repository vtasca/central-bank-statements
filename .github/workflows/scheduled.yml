name: Scheduled Scrape

on:
  # Run daily at 20:00 UTC — most decisions are published by late afternoon
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:
    inputs:
      banks:
        description: "Space-separated bank IDs to scrape (leave empty for all)"
        required: false
        default: ""
      since:
        description: "Only scrape documents on or after this date (YYYY-MM-DD)"
        required: false
        default: ""

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Set up Python
        run: uv python install

      - name: Install dependencies
        run: uv sync

      - name: Run scraper
        run: |
          BANKS_ARG=""
          SINCE_ARG=""
          if [ -n "${{ github.event.inputs.banks }}" ]; then
            BANKS_ARG="--banks ${{ github.event.inputs.banks }}"
          fi
          if [ -n "${{ github.event.inputs.since }}" ]; then
            SINCE_ARG="--since ${{ github.event.inputs.since }}"
          fi
          uv run python -m pipeline.run $BANKS_ARG $SINCE_ARG

      - name: Commit new documents
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No new documents scraped."
          else
            COUNT=$(git diff --cached --name-only | grep -c '\.json$' || true)
            git commit -m "scrape: add ${COUNT} new documents ($(date -u +%Y-%m-%d))"
            git push
          fi
